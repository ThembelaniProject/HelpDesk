services:
  - type: web
    name: helpdesk-system
    runtime: php
    plan: free

    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate --force
      php artisan storage:link || true
      php artisan migrate --force

    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT

    envVars:
      - key: APP_NAME
        value: HelpDesk

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: false

      - key: APP_KEY
        generateValue: true

      - key: APP_URL
        sync: false

      - key: LOG_CHANNEL
        value: stack

      - key: DB_CONNECTION
        value: mysql

      - key: DB_HOST
        fromDatabase:
          name: helpdesk-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: helpdesk-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: helpdesk-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: helpdesk-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: helpdesk-db
          property: password